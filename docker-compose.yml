services:
  postgres:
    image: postgres:16-alpine
    container_name: makerspace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: makerspace
      POSTGRES_USER: makerspace
      POSTGRES_PASSWORD: makerspace
    ports:
      - "5432:5432"
    volumes:
      - makerspace_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U makerspace -d makerspace"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  makerspace_postgres_data:
